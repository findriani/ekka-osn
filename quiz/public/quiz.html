<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
(() => {
  const saved = localStorage.getItem('osnai:theme');
  document.documentElement.dataset.theme = saved ??
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
</script>
<title>Latihan — OSN AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/katex/katex.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<script defer src="assets/katex/katex.min.js"></script>
</head>
<body>
<div class="shell">

<header class="masthead">
  <div class="masthead-inner">
    <a class="wordmark" href="./">OSN AI</a>
    <span class="spacer"></span>
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <a class="eyebrow" href="./" style="text-decoration:none">Semua bank soal →</a>
  </div>
</header>

<main class="quiz-layout">

  <!-- SIGNATURE: reads "terjawab?" while working, "benar?" after submitting -->
  <aside class="rail">
    <span class="eyebrow rail-label" id="railLabel">Terjawab</span>
    <div class="grid" id="grid" role="list"></div>
    <div class="rail-stat">
      <span class="rail-stat-value" id="railValue">0/0</span>
      <span class="rail-stat-label" id="railUnit">soal</span>
    </div>
    <section class="formula-card" id="formulas" hidden></section>
  </aside>

  <div>
    <div class="quiz-head">
      <span class="eyebrow" id="bankEyebrow">Bank soal</span>
      <h1 id="bankTitle">Memuat…</h1>
    </div>

    <section class="result" id="result" hidden aria-live="polite">
      <span class="eyebrow">Nilai kamu</span>
      <p class="result-score" id="scoreBig">—</p>
      <p class="result-line" id="scoreLine"></p>
      <p class="note" id="logNote" hidden></p>
    </section>

    <div class="instructions" id="instructions" hidden></div>

    <form id="quizForm">
      <div class="gate">
        <label for="name">Nama kamu</label>
        <input class="field" type="text" id="name" name="name" autocomplete="name"
               placeholder="misalnya Siti Rahmawati" required>
      </div>

      <div id="questions"></div>

      <div class="actions" id="actions">
        <button class="btn" type="submit" id="submitBtn">Kirim jawaban</button>
        <a class="btn btn-ghost" href="./">Pilih bank soal lain</a>
      </div>
    </form>
  </div>

</main>

</div>
<script type="module" src="assets/js/quiz.js"></script>
<script type="module" src="assets/js/theme.js"></script>
</body>
</html>
