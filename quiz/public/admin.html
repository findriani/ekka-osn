<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
(() => {
  const saved = localStorage.getItem('osnai:theme');
  document.documentElement.dataset.theme = saved ??
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
</script>
<meta name="robots" content="noindex">
<title>Hasil — OSN AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="shell">

<header class="masthead">
  <div class="masthead-inner">
    <a class="wordmark" href="./">OSN AI</a>
    <span class="spacer"></span>
    <button class="theme-toggle" type="button" data-theme-toggle></button>
    <span class="eyebrow">Tampilan pengajar</span>
  </div>
</header>

<main class="page">
  <div class="page-head">
    <span class="eyebrow">Hasil pengerjaan</span>
    <h1>Siapa mengerjakan set mana, dan bagaimana hasilnya.</h1>
  </div>

  <form class="gate" id="authForm">
    <label for="token">Token pengajar</label>
    <input class="field" type="password" id="token" autocomplete="current-password"
           placeholder="Tempelkan token">
    <div class="actions" style="margin-top:1rem;padding-top:0;border-top:0">
      <button class="btn" type="submit">Tampilkan hasil</button>
    </div>
    <p class="note warn" id="authNote" hidden></p>
  </form>

  <section id="panel" hidden>
    <div class="actions" style="margin-top:0;padding-top:0;border-top:0;margin-bottom:1.5rem">
      <button class="btn btn-ghost" type="button" id="csvBtn">Unduh CSV</button>
      <button class="btn btn-ghost" type="button" id="jsonBtn">Unduh JSON</button>
      <button class="btn btn-ghost" type="button" id="refreshBtn">Muat ulang</button>
      <span class="eyebrow" id="count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Waktu kirim</th>
            <th>Nama</th>
            <th>Bank soal</th>
            <th style="text-align:right">Nilai</th>
            <th style="text-align:right">%</th>
            <th style="text-align:right">Dikerjakan</th>
            <th style="text-align:right">Durasi</th>
            <th>Per soal</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </section>
</main>

</div>
<script type="module" src="assets/js/admin.js"></script>
<script type="module" src="assets/js/theme.js"></script>
</body>
</html>
